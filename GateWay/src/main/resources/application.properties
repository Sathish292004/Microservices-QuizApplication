spring.application.name=GateWay

server.port=8765

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webmvc.routes[0].id=quiz-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://QUIZ-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/QUIZ-SERVICE/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[1].id=question-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://QUESTION-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/QUESTION-SERVICE/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=StripPrefix=1


